<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIVHED Fideicomiso Projects Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">MIVHED Fideicomiso</p>
          <h1>Housing Projects Dashboard</h1>
        </div>
        <div class="search-wrap">
          <label for="search">Search</label>
          <input id="search" type="search" placeholder="Project, province, builder, fiduciary..." />
        </div>
      </section>

      <section class="filters" aria-label="Filters">
        <label>
          Year
          <select id="yearFilter"></select>
        </label>
        <label>
          Province
          <select id="provinceFilter"></select>
        </label>
        <label>
          Fiduciary
          <select id="fiduciaryFilter"></select>
        </label>
        <button id="resetFilters" type="button">Reset</button>
      </section>

      <section class="metrics" aria-label="Summary metrics">
        <article>
          <span>Projects</span>
          <strong id="projectCount">0</strong>
        </article>
        <article>
          <span>Housing Units</span>
          <strong id="unitCount">0</strong>
        </article>
        <article>
          <span>Project Cost</span>
          <strong id="costTotal">RD$0</strong>
        </article>
        <article>
          <span>Compensation</span>
          <strong id="compTotal">RD$0</strong>
        </article>
      </section>

      <section class="grid">
        <article class="panel wide">
          <div class="panel-head">
            <h2>Projects By Year</h2>
            <span id="yearRange"></span>
          </div>
          <div id="yearChart" class="bar-chart" aria-label="Projects by year"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Top Provinces</h2>
            <span>by projects</span>
          </div>
          <div id="provinceChart" class="rank-chart"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Top Fiduciaries</h2>
            <span>by projects</span>
          </div>
          <div id="fiduciaryChart" class="rank-chart"></div>
        </article>
      </section>

      <section class="panel table-panel">
        <div class="panel-head">
          <h2>Project List</h2>
          <span id="tableCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-sort="year">Year</th>
                <th data-sort="project">Project</th>
                <th data-sort="province">Province</th>
                <th data-sort="municipality">Municipality</th>
                <th data-sort="builder">Builder</th>
                <th data-sort="fiduciary">Fiduciary</th>
                <th data-sort="units">Units</th>
                <th data-sort="cost">Cost</th>
                <th data-sort="compensation">Compensation</th>
              </tr>
            </thead>
            <tbody id="projectRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
